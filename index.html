<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Oldagram</title>

  <!-- fonts pulled from Google (kept simple, no build system here) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="index.css">
</head>

<body>

  <div class="app">

    <!-- top nav (logo + user controls) -->
    <nav>
      <div class="nav-logo-text">Oldagram</div>

      <!-- right side controls (theme toggle + user avatar) -->
      <div class="nav-right">

        <!-- simple checkbox toggle for dark mode (JS handles behavior) -->
        <label class="theme-switch">
          <input type="checkbox" id="themeToggle">
          <span class="slider"></span>
        </label>

        <!-- static user avatar for now -->
        <img src="images/user-avatar.png" alt="Your profile" class="nav-avatar">
      </div>
    </nav>

    <!-- stories row (rendered dynamically, kept separate from feed for layout clarity) -->
    <div class="stories" id="stories"></div>

    <!-- main feed (JS injects posts here) -->
    <main id="feed"></main>

  </div>

  <!-- bottom nav (mobile-style shortcuts, purely visual in this version) -->
  <div class="bottom-nav">

    <button class="nav-btn active">
      <img src="images/icon-home.png" alt="Home" class="nav-icon">
    </button>

    <button class="nav-btn">
      <img src="images/icon-search.png" alt="Search" class="nav-icon">
    </button>

    <button class="nav-btn">
      <img src="images/icon-plus.png" alt="New post" class="nav-icon">
    </button>

    <button class="nav-btn">
      <img src="images/icon-reels.png" alt="Reels" class="nav-icon">
    </button>

    <button class="nav-btn">
      <img src="images/icon-profile.png" alt="Profile" class="nav-icon">
    </button>

  </div>

  <script src="index.js"></script>

</body>
</html>
